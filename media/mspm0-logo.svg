<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="body" x1="58" y1="58" x2="198" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172554"/>
      <stop offset="0.55" stop-color="#12366B"/>
      <stop offset="1" stop-color="#0B4B52"/>
    </linearGradient>
    <linearGradient id="edge" x1="64" y1="62" x2="194" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="pins" x1="38" y1="38" x2="218" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C7D2FE"/>
      <stop offset="0.5" stop-color="#94A3B8"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="shadow" x="34" y="34" width="188" height="194" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Pins -->
  <g fill="url(#pins)">
    <rect x="77" y="38" width="12" height="28" rx="5"/>
    <rect x="99.5" y="38" width="12" height="28" rx="5"/>
    <rect x="122" y="38" width="12" height="28" rx="5"/>
    <rect x="144.5" y="38" width="12" height="28" rx="5"/>
    <rect x="167" y="38" width="12" height="28" rx="5"/>

    <rect x="77" y="190" width="12" height="28" rx="5"/>
    <rect x="99.5" y="190" width="12" height="28" rx="5"/>
    <rect x="122" y="190" width="12" height="28" rx="5"/>
    <rect x="144.5" y="190" width="12" height="28" rx="5"/>
    <rect x="167" y="190" width="12" height="28" rx="5"/>

    <rect x="38" y="77" width="28" height="12" rx="5"/>
    <rect x="38" y="99.5" width="28" height="12" rx="5"/>
    <rect x="38" y="122" width="28" height="12" rx="5"/>
    <rect x="38" y="144.5" width="28" height="12" rx="5"/>
    <rect x="38" y="167" width="28" height="12" rx="5"/>

    <rect x="190" y="77" width="28" height="12" rx="5"/>
    <rect x="190" y="99.5" width="28" height="12" rx="5"/>
    <rect x="190" y="122" width="28" height="12" rx="5"/>
    <rect x="190" y="144.5" width="28" height="12" rx="5"/>
    <rect x="190" y="167" width="28" height="12" rx="5"/>
  </g>

  <g filter="url(#shadow)">
    <!-- Chip body -->
    <rect x="58" y="58" width="140" height="140" rx="28" fill="url(#body)"/>
    <rect x="62" y="62" width="132" height="132" rx="24" stroke="url(#edge)" stroke-width="4"/>

    <!-- Pin-1 marker -->
    <circle cx="82" cy="82" r="6" fill="#67E8F9"/>

    <!-- Shared label plate -->
    <rect x="74" y="108" width="108" height="44" rx="12" fill="#081A33" fill-opacity="0.9"/>
    <rect x="76" y="110" width="104" height="40" rx="10" stroke="#7DD3FC" stroke-opacity="0.45" stroke-width="2"/>

    <!-- Shared wordmark -->
    <text x="128" y="138.5"
          text-anchor="middle"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="24"
          font-weight="800"
          letter-spacing="0.8"
          fill="#F8FAFC">MSPM0</text>
  </g>
</svg>
